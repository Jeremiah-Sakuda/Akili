<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Akili — Coordinate-Grounded Verification for Engineering Documents</title>
    <meta name="description" content="Akili is the reasoning control plane for mission-critical engineering. Every answer is tied to exact coordinates on your source documents — or the system refuses. No citations. Only proof." />
    <meta name="keywords" content="verification, engineering documents, datasheets, schematics, coordinate grounding, AI verification, technical documentation" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Akili — No Citations. Only Proof." />
    <meta property="og:description" content="The reasoning control plane for mission-critical engineering. Every answer is tied to exact coordinates on your source documents — or the system refuses." />
    <meta property="og:site_name" content="Akili" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Akili — No Citations. Only Proof." />
    <meta name="twitter:description" content="Coordinate-grounded verification for engineering documents. Deterministic answers with proof — or refusal." />

    <link rel="canonical" href="https://akili.vercel.app/" />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Space+Grotesk:wght@400;500;600;700&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <script>
      (function () {
        var key = 'akili-theme';
        var stored = localStorage.getItem(key);
        var prefersDark = !stored && window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        var theme = stored === 'very-dark' || stored === 'dark' || stored === 'light' ? stored : (prefersDark ? 'dark' : 'light');
        var root = document.documentElement;
        root.setAttribute('data-theme', theme);
        root.classList.remove('dark', 'very-dark');
        if (theme === 'very-dark') { root.classList.add('dark', 'very-dark'); }
        else if (theme === 'dark') { root.classList.add('dark'); }
      })();
    </script>
    <style>
      ::-webkit-scrollbar { width: 10px; height: 10px; }
      ::-webkit-scrollbar-track { background: #f9fafb; }
      ::-webkit-scrollbar-thumb { background: #d1d5db; border: 2px solid #f9fafb; }
      ::-webkit-scrollbar-thumb:hover { background: #9ca3af; }
      .dark ::-webkit-scrollbar-track { background: #161b22; }
      .dark ::-webkit-scrollbar-thumb { background: #30363d; border-color: #161b22; }
      .dark ::-webkit-scrollbar-thumb:hover { background: #484f58; }
    </style>
  </head>
  <body class="bg-background-light text-slate-900 font-display h-screen overflow-hidden selection:bg-primary/20">
    <div id="root" class="h-full flex flex-col"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
