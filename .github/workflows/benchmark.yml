# AKILI Benchmark CI - Runs accuracy regression tests
# Triggered manually or on release branches
name: Benchmark

on:
  workflow_dispatch:
    inputs:
      chip:
        description: 'Specific chip to test (leave empty for all)'
        required: false
        type: string
  push:
    branches: [main, master]
    paths:
      - 'benchmark/**'
      - 'src/akili/**'

jobs:
  benchmark-regression:
    name: Benchmark Regression
    runs-on: ubuntu-latest
    # Only run if we have the API key secret
    if: ${{ github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python 3.11
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install google-generativeai

      - name: Run benchmark (specific chip)
        if: ${{ github.event.inputs.chip != '' }}
        run: python benchmark/run_benchmark.py --check-regression --chip "${{ github.event.inputs.chip }}"
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}

      - name: Run benchmark (all chips)
        if: ${{ github.event.inputs.chip == '' }}
        run: python benchmark/run_benchmark.py --check-regression
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmark/results.json
          retention-days: 30

      - name: Comment on PR with results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const results = JSON.parse(fs.readFileSync('benchmark/results.json', 'utf8'));

            let body = '## Benchmark Results\n\n';
            body += '| Chip | AKILI | Gemini | Delta |\n';
            body += '|------|-------|--------|-------|\n';

            for (const chip of results.chips) {
              const delta = chip.hallucination_delta > 0 ? `+${chip.hallucination_delta}%` : `${chip.hallucination_delta}%`;
              body += `| ${chip.chip} | ${chip.akili_accuracy}% | ${chip.gemini_accuracy}% | ${delta} |\n`;
            }

            body += `\n**Overall:** AKILI ${results.overall.akili_accuracy}% vs Gemini ${results.overall.gemini_accuracy}%`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
