# Akili — Deploy to Google Cloud Run
# Triggered on push to main branch after CI passes
name: Deploy

on:
  push:
    branches: [main, master]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  PROJECT_ID: akili-9d5fe
  REGION: us-central1
  API_SERVICE: akili-api
  FRONTEND_SERVICE: akili-frontend

jobs:
  deploy-api:
    name: Deploy Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker --quiet

      - name: Build and push API image
        run: |
          docker build -t gcr.io/$PROJECT_ID/$API_SERVICE:${{ github.sha }} -t gcr.io/$PROJECT_ID/$API_SERVICE:latest .
          docker push gcr.io/$PROJECT_ID/$API_SERVICE:${{ github.sha }}
          docker push gcr.io/$PROJECT_ID/$API_SERVICE:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy $API_SERVICE \
            --image gcr.io/$PROJECT_ID/$API_SERVICE:${{ github.sha }} \
            --region $REGION \
            --platform managed \
            --allow-unauthenticated \
            --memory 1Gi \
            --cpu 1 \
            --timeout 300 \
            --concurrency 80 \
            --min-instances 0 \
            --max-instances 10 \
            --set-secrets "GOOGLE_API_KEY=GOOGLE_API_KEY:latest,FIREBASE_PROJECT_ID=FIREBASE_PROJECT_ID:latest" \
            --set-env-vars "AKILI_REQUIRE_AUTH=0,AKILI_RATE_LIMIT=0"

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: deploy-api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker --quiet

      - name: Get API URL
        id: api-url
        run: |
          API_URL=$(gcloud run services describe $API_SERVICE --region $REGION --format='value(status.url)')
          echo "url=$API_URL" >> $GITHUB_OUTPUT

      - name: Build and push frontend image
        working-directory: frontend
        run: |
          docker build \
            -f Dockerfile.prod \
            --build-arg VITE_API_URL=${{ steps.api-url.outputs.url }} \
            --build-arg VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY }} \
            --build-arg VITE_FIREBASE_AUTH_DOMAIN=${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }} \
            --build-arg VITE_FIREBASE_PROJECT_ID=${{ secrets.VITE_FIREBASE_PROJECT_ID }} \
            --build-arg VITE_FIREBASE_STORAGE_BUCKET=${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }} \
            --build-arg VITE_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }} \
            --build-arg VITE_FIREBASE_APP_ID=${{ secrets.VITE_FIREBASE_APP_ID }} \
            --build-arg VITE_FIREBASE_MEASUREMENT_ID=${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }} \
            -t gcr.io/$PROJECT_ID/$FRONTEND_SERVICE:${{ github.sha }} \
            -t gcr.io/$PROJECT_ID/$FRONTEND_SERVICE:latest \
            .
          docker push gcr.io/$PROJECT_ID/$FRONTEND_SERVICE:${{ github.sha }}
          docker push gcr.io/$PROJECT_ID/$FRONTEND_SERVICE:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy $FRONTEND_SERVICE \
            --image gcr.io/$PROJECT_ID/$FRONTEND_SERVICE:${{ github.sha }} \
            --region $REGION \
            --platform managed \
            --allow-unauthenticated \
            --memory 256Mi \
            --cpu 1 \
            --concurrency 200 \
            --min-instances 0 \
            --max-instances 5

      - name: Output URLs
        run: |
          echo "### Deployment Complete! :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**API:** $(gcloud run services describe $API_SERVICE --region $REGION --format='value(status.url)')" >> $GITHUB_STEP_SUMMARY
          echo "**Frontend:** $(gcloud run services describe $FRONTEND_SERVICE --region $REGION --format='value(status.url)')" >> $GITHUB_STEP_SUMMARY
